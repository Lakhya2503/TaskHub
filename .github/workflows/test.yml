name: Test project
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name : Get Code
        uses: actions/checkout@v6
      - name: Install NodeJs
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name : Install dependencies (server)
        run: cd server && npm ci
      - name: Install dependencies ( client)
        run : cd server && npm ci
